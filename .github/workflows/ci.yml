name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] 

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test   

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app .

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push to Docker Hub
        if: success()  
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app

      - name: Tag for second registry
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/flask-app myregistry.com/flask-app

      - name: Login second registry
        run: docker login myregistry.com -u user -p password

      - name: Push to second registry
        run: docker push myregistry.com/flask-app

  
  notify:
    runs-on: ubuntu-latest
    needs: test
    if: failure()  

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Failed ❌"
          body: "Les tests ont échoué"
          to: tonemail@gmail.com
          from: GitHub Actions